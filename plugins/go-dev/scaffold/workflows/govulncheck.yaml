name: govulncheck
permissions:
  contents: read
on:
  push:
  pull_request:
    types: [closed]
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
jobs:
  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
