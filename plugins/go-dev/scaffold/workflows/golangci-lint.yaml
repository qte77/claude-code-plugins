name: golangci-lint
permissions:
  contents: read
on:
  push:
  pull_request:
    types: [closed]
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.0
